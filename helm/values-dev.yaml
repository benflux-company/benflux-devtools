components:
  api:
    replicaCount: 1
    image:
      repository: ghcr.io/benflux-company/benflux-devtools-api
      tag: 59b6f5e6209b8596cec4751fcd290145875b8d46
      pullPolicy: Always
    service:
      port: 80
      targetPort: 4000
    healthCheck:
      path: /api/health
    ingress:
      enabled: false
    gateway:
      enabled: true
      host: api-dev.benfluxgroup.com
      path: /benflux-devtools-api
      extraAnnotations:
        nginx.ingress.kubernetes.io/limit-rps: "30"
        nginx.ingress.kubernetes.io/limit-connections: "20"
        nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    autoscaling:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 250m
        memory: 384Mi
    env:
      NODE_ENV: production
      APP_ENV: dev
      PORT: "4000"
      GITHUB_OWNER: benflux-company
      GITHUB_REPO: benflux-devtools
      FRONTEND_URL: https://devtools-dev.benfluxgroup.com
      AUTH_API_URL: https://auth-dev.benfluxgroup.com
      AUTH_PUBLIC_URL: https://auth-dev.benfluxgroup.com

  web:
    replicaCount: 1
    image:
      repository: ghcr.io/benflux-company/benflux-devtools-web
      tag: 594ff8214acdc012e16ac83a3587dda5f41a5c51
      pullPolicy: Always
    service:
      port: 80
      targetPort: 3000
    healthCheck:
      path: /
    ingress:
      enabled: true
      host: devtools-dev.benfluxgroup.com
    gateway:
      enabled: false
    autoscaling:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 250m
        memory: 384Mi
    env:
      NODE_ENV: production
      APP_ENV: dev
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: https://api-dev.benfluxgroup.com/benflux-devtools-api/api
      NEXT_PUBLIC_APP_URL: https://devtools-dev.benfluxgroup.com
      NEXT_PUBLIC_AUTH_PUBLIC_URL: https://auth-dev.benfluxgroup.com
      AUTH_API_URL: https://auth-dev.benfluxgroup.com

postgres:
  storage: 5Gi

# Sized for worst-case: all 3 deployments rolling simultaneously (2 pods each)
# + migration job. api×2: 192Mi/768Mi — web×2: 192Mi/768Mi
# postgres×2: 256Mi/1024Mi — migrate: 64Mi/192Mi
resourceQuota:
  requestsCpu: 600m
  requestsMemory: 750Mi
  limitsCpu: "3"
  limitsMemory: 3Gi

limitRange:
  defaultRequestCpu: 50m
  defaultRequestMemory: 96Mi
  defaultLimitCpu: 250m
  defaultLimitMemory: 384Mi
