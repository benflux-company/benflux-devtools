components:
  api:
    replicaCount: 1
    image:
      repository: ghcr.io/benflux-company/benflux-devtools-api
      tag: latest
      pullPolicy: Always
    service:
      port: 80
      targetPort: 4000
    healthCheck:
      path: /api/health
    ingress:
      enabled: false
    gateway:
      enabled: true
      host: api-staging.benfluxgroup.com
      path: /benflux-devtools-api
    autoscaling:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      NODE_ENV: production
      APP_ENV: staging
      PORT: "4000"
      GITHUB_OWNER: benflux-company
      GITHUB_REPO: benflux-devtools
      FRONTEND_URL: https://devtools-staging.benfluxgroup.com
      AUTH_API_URL: https://auth-staging.benfluxgroup.com
      AUTH_PUBLIC_URL: https://auth-staging.benfluxgroup.com

  web:
    replicaCount: 1
    image:
      repository: ghcr.io/benflux-company/benflux-devtools-web
      tag: latest
      pullPolicy: Always
    service:
      port: 80
      targetPort: 3000
    healthCheck:
      path: /
    ingress:
      enabled: true
      host: devtools-staging.benfluxgroup.com
    gateway:
      enabled: false
    autoscaling:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      NODE_ENV: production
      APP_ENV: staging
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: https://api-staging.benfluxgroup.com/benflux-devtools-api/api
      NEXT_PUBLIC_APP_URL: https://devtools-staging.benfluxgroup.com
      NEXT_PUBLIC_AUTH_PUBLIC_URL: https://auth-staging.benfluxgroup.com

postgres:
  storage: 10Gi

# Same edge-of-quota issue benflux-admin hit: size for 2x replicaCount surge
# headroom per component, plus postgres, not just the bare replica counts.
resourceQuota:
  requestsCpu: 500m
  requestsMemory: 640Mi
  limitsCpu: "2500m"
  limitsMemory: 2500Mi

limitRange:
  defaultRequestCpu: 100m
  defaultRequestMemory: 128Mi
  defaultLimitCpu: 500m
  defaultLimitMemory: 512Mi
