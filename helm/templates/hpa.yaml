{{- range $name, $comp := .Values.components }}
{{- if and $comp.autoscaling $comp.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $.Chart.Name }}-{{ $name }}
  namespace: {{ $.Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $.Chart.Name }}-{{ $name }}
  minReplicas: {{ $comp.autoscaling.minReplicas }}
  maxReplicas: {{ $comp.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $comp.autoscaling.targetCPU }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $comp.autoscaling.targetMemory }}
{{- end }}
{{- end }}
