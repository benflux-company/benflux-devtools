{{- range $name, $comp := .Values.components }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $.Chart.Name }}-{{ $name }}-netpol
  namespace: {{ $.Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ $.Chart.Name }}-{{ $name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: {{ $comp.service.targetPort }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 5432
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
{{- end }}
