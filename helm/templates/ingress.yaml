{{- range $name, $comp := .Values.components }}
{{- if and $comp.ingress $comp.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $.Chart.Name }}-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: {{ $comp.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Chart.Name }}-{{ $name }}
                port:
                  number: {{ $comp.service.port }}
  tls:
    - hosts:
        - {{ $comp.ingress.host }}
      secretName: {{ $.Chart.Name }}-{{ $name }}-tls
{{- end }}
{{- end }}
