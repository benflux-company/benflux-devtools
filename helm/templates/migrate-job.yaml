apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-api-migrate
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-credentials
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z benflux-devtools-postgres 5432; do
                echo "waiting for postgres..."; sleep 3
              done
              echo "postgres is ready"
      containers:
        - name: migrate
          image: "{{ .Values.components.api.image.repository }}:{{ .Values.components.api.image.tag }}"
          imagePullPolicy: {{ .Values.components.api.image.pullPolicy }}
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: {{ .Chart.Name }}-api-secrets
                optional: true
          env:
            {{- range $key, $val := .Values.components.api.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 192Mi
