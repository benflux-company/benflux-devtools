apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-api-migrate
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: migrate
          image: "{{ .Values.components.api.image.repository }}:{{ .Values.components.api.image.tag }}"
          imagePullPolicy: {{ .Values.components.api.image.pullPolicy }}
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: {{ .Chart.Name }}-api-secrets
                optional: true
          env:
            {{- range $key, $val := .Values.components.api.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 192Mi
