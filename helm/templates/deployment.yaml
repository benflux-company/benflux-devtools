{{- range $name, $comp := .Values.components }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Chart.Name }}-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $.Chart.Name }}-{{ $name }}
    env: {{ $comp.env.APP_ENV | default "production" }}
spec:
  replicas: {{ $comp.replicaCount }}
  selector:
    matchLabels:
      app: {{ $.Chart.Name }}-{{ $name }}
  template:
    metadata:
      labels:
        app: {{ $.Chart.Name }}-{{ $name }}
        env: {{ $comp.env.APP_ENV | default "production" }}
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: {{ $name }}
          image: "{{ $comp.image.repository }}:{{ $comp.image.tag }}"
          imagePullPolicy: {{ $comp.image.pullPolicy }}
          ports:
            - containerPort: {{ $comp.service.targetPort }}
          envFrom:
            - secretRef:
                name: {{ $.Chart.Name }}-{{ $name }}-secrets
                optional: true
            - secretRef:
                name: internal-service-jwt
                optional: true
          env:
            {{- range $key, $val := $comp.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml $comp.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ $comp.healthCheck.path | default "/" }}
              port: {{ $comp.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: {{ $comp.healthCheck.path | default "/" }}
              port: {{ $comp.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
{{- end }}
