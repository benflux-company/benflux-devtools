version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: benflux_devtools_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-benflux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benflux_secret}
      POSTGRES_DB: ${POSTGRES_DB:-benflux_devtools}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-benflux}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: benflux_devtools_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-benflux}:${POSTGRES_PASSWORD:-benflux_secret}@postgres:5432/${POSTGRES_DB:-benflux_devtools}
      AUTH_API_URL: ${AUTH_API_URL:-http://localhost:3100}
      AUTH_PUBLIC_URL: ${AUTH_PUBLIC_URL:-http://localhost:3100}
      GATEWAY_HMAC_SECRET: ${GATEWAY_HMAC_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER}
      GITHUB_REPO: ${GITHUB_REPO}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 4000
      NODE_ENV: production
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: benflux_devtools_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_AUTH_PUBLIC_URL: ${NEXT_PUBLIC_AUTH_PUBLIC_URL:-http://localhost:3100}
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
    name: benflux_devtools_postgres_data
